<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>2026小江戸大江戸200K 現在位置表示</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.2.0/gpx.js"></script>
     <link rel="stylesheet" href="https://unpkg.com/@raruto/leaflet-elevation/dist/leaflet-elevation.css" />
    <script src="https://unpkg.com/@raruto/leaflet-elevation/dist/leaflet-elevation.js"></script>
</head>

<body>
<!--地図本体表示パネル-->
<div id="mapid" style="width: 100%; height: 100dvh;"></div>
<!-- 情報表示用のパネル -->
<div id="info" style="padding: 10px; background: white; border: 1px solid #ccc;">
    距離: <span id="distance">-</span> km / 
    獲得標高: <span id="elevation">-</span> m
</div>

<div id="map" style="height: 500px;"></div>

<script>
// マップの初期化
var map = L.map('mapid').setView([35.681, 139.767], 13);

map.setView([35.658825, 139.702904], 5); // (2)地図の中心座標とズームレベル
   // (3)表示する地図のURLや著作権表記
    L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
          attribution: "<a href='https://maps.gsi.go.jp/development/ichiran.html' target='_blank'>地理院タイル</a>"
      }).addTo(map);



var gpxFile = '26coedoooedo_sugapon.gpx'; // GPXファイルのパスを指定
new L.GPX(gpxFile, {
    async: true,
    spawnMarker: true // 開始・終了マーカーが不要な場合はfalse
}).on('loaded', function(e) {
    var gpx = e.target;
    
    // 距離の取得（メートル単位で返るため1000で割ってkmに変換）
    var dist = (gpx.get_distance() / 1000).toFixed(2);
    // 獲得標高の取得
    var elev = Math.round(gpx.get_elevation_gain());
    
    // 画面に表示
    document.getElementById('distance').innerText = dist;
    document.getElementById('elevation').innerText = elev;

    map.fitBounds(gpx.get_bounds());
}).addTo(map);


// 2. 現在地の表示
// 現在地を示すためのマーカーと円
//var curMarker = L.marker([0, 0]).addTo(map);

var curMarker = L.circleMarker([0, 0], {
    radius: 5,         // 円の大きさ
    fillColor: "red",   // 中の色
    color: "#fff",      // 枠線の色
    weight: 2,          // 枠線の太さ
    opacity: 1,         // 枠線の透明度
    fillOpacity: 0.8    // 中の透明度
}).addTo(map);
var curCircle = L.circle([0, 0], {radius: 0,color: 'red'}).addTo(map);

// 位置情報の取得設定
map.locate({
    watch: false,           // 継続的に位置を監視
    enableHighAccuracy: true // 高精度モード
});

// 位置が見つかった時の処理
map.on('locationfound', function(e) {
    var radius = e.accuracy / 2; // 精度（誤差）を円の半径に

    curMarker.setLatLng(e.latlng).bindPopup("あなたは今ここにいます").openPopup();
    curCircle.setLatLng(e.latlng).setRadius(radius);
    map.setView(e.latlng, 15);
});


</script>
</body>
</html>
